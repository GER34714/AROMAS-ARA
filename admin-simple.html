<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Admin - Aromas Ara</title>
  <style>
    :root{
      --bg:#fbf8f5;
      --bg-soft:#f4ede7;
      --card:#fffdfa;
      --line:#eadfd6;
      --text:#5d4b43;
      --muted:#8a7368;
      --accent:#c8a891;
      --shadow:0 12px 30px rgba(116,88,74,.10);
      --radius-xl:28px;
      --radius-lg:22px;
      --header-h:74px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:linear-gradient(180deg,#fdfaf7 0%,#fbf8f5 35%,#f8f2ed 100%);
      color:var(--text);
      overflow-x:hidden;
      min-height:100vh;
    }
    .container{width:min(1180px,calc(100% - 28px));margin:0 auto}
    header{
      position:sticky;top:0;z-index:50;backdrop-filter:blur(14px);
      background:rgba(251,248,245,.82);
      border-bottom:1px solid rgba(234,223,214,.72);
    }
    .topbar{min-height:var(--header-h);display:flex;align-items:center;justify-content:space-between;gap:14px}
    .brand{display:flex;flex-direction:column;line-height:1}
    .brand strong{font-size:1.28rem;letter-spacing:.08em;font-weight:800;text-transform:uppercase}
    .brand span{color:var(--muted);font-size:.83rem;margin-top:7px;letter-spacing:.04em}
    .header-actions{display:flex;align-items:center;gap:10px}
    .wa-btn,.ghost-btn,.soft-btn{border:none;cursor:pointer;border-radius:999px;transition:transform .2s ease,box-shadow .2s ease,background .2s ease}
    .wa-btn:hover,.ghost-btn:hover,.soft-btn:hover{transform:translateY(-1px)}
    .wa-btn{background:linear-gradient(135deg,var(--accent),#b9957d);color:white;padding:12px 18px;font-weight:700;box-shadow:var(--shadow)}
    .ghost-btn{background:transparent;border:1px solid var(--line);color:var(--text);padding:11px 16px}
    .soft-btn{background:var(--card);border:1px solid var(--line);color:var(--text);padding:12px 16px}
    
    /* Login */
    .login-container{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
    .login-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius-xl);box-shadow:var(--shadow);padding:32px;width:100%;max-width:420px}
    .login-header{text-align:center;margin-bottom:28px}
    .login-header h2{font-size:1.8rem;margin-bottom:8px;letter-spacing:-.03em}
    .login-header p{color:var(--muted);line-height:1.6}
    .form-group{margin-bottom:20px}
    .form-group label{display:block;margin-bottom:8px;font-weight:600}
    .form-group input,.form-group textarea,.form-group select{width:100%;padding:12px 16px;border:1px solid var(--line);border-radius:999px;background:var(--bg-soft);outline:none;color:var(--text);transition:.22s ease}
    .form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--accent);background:var(--card)}
    .form-group textarea{border-radius:12px;resize:vertical}
    .form-group select{border-radius:12px}
    
    /* Admin Dashboard */
    .admin-container{display:none}
    .admin-container.active{display:block}
    .admin-header{padding:20px 0}
    .admin-actions{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin:24px 0}
    .stat-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius-lg);padding:20px;text-align:center}
    .stat-number{font-size:2rem;font-weight:800;color:var(--accent)}
    .stat-label{color:var(--muted);margin-top:4px}
    
    .products-section{margin-top:32px}
    .section-head{display:flex;align-items:end;justify-content:space-between;gap:14px;margin-bottom:18px}
    .section-head h2{font-size:clamp(1.45rem,2.5vw,2.1rem);letter-spacing:-.03em}
    .section-head p{color:var(--muted);max-width:55ch;line-height:1.6}
    
    .products-table{background:var(--card);border:1px solid var(--line);border-radius:var(--radius-lg);overflow:hidden}
    table{width:100%;border-collapse:collapse}
    th{background:var(--bg-soft);padding:16px;text-align:left;font-weight:600;border-bottom:1px solid var(--line)}
    td{padding:16px;border-bottom:1px solid var(--line)}
    tr:last-child td{border-bottom:none}
    .product-img{width:60px;height:60px;border-radius:12px;object-fit:cover;background:var(--bg-soft)}
    .no-image{width:60px;height:60px;border-radius:12px;background:var(--bg-soft);display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:var(--muted)}
    .actions-cell{display:flex;gap:8px}
    .btn-small{padding:8px 12px;font-size:.88rem;border-radius:12px;transition:.22s ease}
    .btn-edit{background:var(--bg-soft);color:var(--text);border:1px solid var(--line);cursor:pointer}
    .btn-edit:hover{background:var(--card);transform:translateY(-1px)}
    .btn-delete{background:#fee;color:#c00;border:1px solid #fcc;cursor:pointer}
    .btn-delete:hover{background:#fdd;transform:translateY(-1px)}
    
    /* Modal */
    .modal{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:16px;background:rgba(38,24,18,.52);backdrop-filter:blur(8px)}
    .modal.open{display:flex}
    .modal-card{width:min(100%,680px);max-height:92vh;overflow:auto;background:var(--card);border:1px solid var(--line);border-radius:var(--radius-xl);box-shadow:var(--shadow);padding:24px}
    .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
    .modal-header h3{font-size:1.4rem;letter-spacing:-.02em}
    .close-btn{background:transparent;border:none;font-size:1.5rem;cursor:pointer;color:var(--muted);padding:4px;border-radius:8px;transition:.22s ease}
    .close-btn:hover{background:var(--bg-soft);color:var(--text)}
    .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px}
    .form-grid.full{grid-template-columns:1fr}
    .form-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:24px}
    .error{color:#c00;background:#fee;padding:12px;border-radius:12px;margin-bottom:16px}
    .success{color:#060;background:#efe;padding:12px;border-radius:12px;margin-bottom:16px}
  </style>
  <script type="module" crossorigin src="/assets/admin-D7xoEKNV.js"></script>
</head>
<body>
  <!-- Login Screen -->
  <div class="login-container" id="loginContainer">
    <div class="login-card">
      <div class="login-header">
        <h2>Panel Admin</h2>
        <p>Aromas Ara - Gestión de Productos</p>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" required placeholder="Ingresa la contraseña">
        </div>
        <button type="submit" class="wa-btn" style="width:100%">Ingresar</button>
      </form>
    </div>
  </div>

  <!-- Admin Dashboard -->
  <div class="admin-container" id="adminContainer">
    <header>
      <div class="container topbar">
        <div class="brand">
          <strong>Aromas Ara</strong>
          <span>Panel de Administración</span>
        </div>
        <div class="header-actions">
          <button class="ghost-btn" id="logoutBtn">Cerrar Sesión</button>
        </div>
      </div>
    </header>

    <main class="container">
      <div class="admin-header">
        <h1>🛍️ Gestión de Productos</h1>
        <div class="admin-actions">
          <button class="wa-btn" id="addProductBtn">➕ Agregar Producto</button>
          <button class="soft-btn" id="refreshBtn">🔄 Actualizar</button>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-number" id="totalProducts">0</div>
          <div class="stat-label">Total Productos</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="availableProducts">0</div>
          <div class="stat-label">Disponibles</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="orderProducts">0</div>
          <div class="stat-label">Por Encargue</div>
        </div>
      </div>

      <div class="products-section">
        <div class="products-table">
          <table>
            <thead>
              <tr>
                <th>Imagen</th>
                <th>Producto</th>
                <th>Categoría</th>
                <th>Precio</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="productsTableBody">
              <tr>
                <td colspan="6" style="text-align: center; padding: 40px; color: var(--muted);">
                  Cargando productos...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Product Modal -->
  <div class="modal" id="productModal">
    <div class="modal-card">
      <div class="modal-header">
        <h3 id="modalTitle">Agregar Producto</h3>
        <button class="close-btn" id="closeModal">✕</button>
      </div>
      <form id="productForm">
        <div class="form-grid">
          <div class="form-group">
            <label for="productName">Nombre del Producto</label>
            <input type="text" id="productName" required>
          </div>
          <div class="form-group">
            <label for="productCategory">Categoría</label>
            <div style="display: flex; gap: 8px; align-items: center;">
              <select id="productCategory" required style="flex: 1;">
                <option value="">Seleccionar categoría</option>
              </select>
              <button type="button" id="addCategoryBtn" class="btn-small" style="padding: 8px 12px; font-size: 0.75rem; background: var(--bg-soft); border: 1px solid var(--line); color: var(--text); border-radius: 8px; cursor: pointer; white-space: nowrap;">+ Cat</button>
            </div>
          </div>
        </div>
        <div class="form-grid full">
          <div class="form-group">
            <label for="productDescription">Descripción</label>
            <textarea id="productDescription" rows="3"></textarea>
          </div>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label for="productPrice">Precio</label>
            <input type="number" id="productPrice" step="0.01" placeholder="0.00">
          </div>
          <div class="form-group">
            <label for="productStatus">Estado</label>
            <select id="productStatus">
              <option value="Por encargue">Por encargue</option>
              <option value="Disponible">Disponible</option>
              <option value="Agotado">Agotado</option>
            </select>
          </div>
        </div>
        <div class="form-grid full">
          <div class="form-group">
            <label for="productImageUrl">URL de Imagen</label>
            <input type="url" id="productImageUrl" placeholder="https://...">
            <div style="margin-top: 10px;">
              <label style="font-size: 0.9rem; color: var(--muted);">o cargar archivo:</label>
              <input type="file" id="productImageFile" accept="image/*" style="margin-top: 5px; width: 100%; padding: 8px; border: 1px solid var(--line); border-radius: 8px; background: var(--bg-soft);">
            </div>
            <div id="imagePreview" style="margin-top: 10px; display: none;">
              <img id="previewImg" style="max-width: 200px; max-height: 200px; border-radius: 8px; object-fit: cover;">
            </div>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="ghost-btn" id="cancelBtn">Cancelar</button>
          <button type="submit" class="wa-btn">Guardar Producto</button>
        </div>
      </form>
    </div>
  </div>

</body>
</html>
